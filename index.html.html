  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;}
  body{background:radial-gradient(120% 70% at 50% 0%, #171F23 0%, var(--bg) 62%);}
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:40px;position:relative;box-shadow:0 0 80px rgba(0,0,0,0.5);}

  .display{font-family:'Teko',sans-serif;font-weight:600;letter-spacing:0.02em;text-transform:uppercase;}
  .mono{font-family:'JetBrains Mono',monospace;}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:10;background:linear-gradient(180deg, var(--bg) 70%, transparent);padding:18px 20px 10px;display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);}
  .brand span{font-family:'Teko',sans-serif;font-size:26px;font-weight:700;letter-spacing:0.04em;}
  .backbtn{background:none;border:1px solid var(--line);color:var(--ink-dim);font-family:'Inter';font-size:13px;padding:6px 12px;border-radius:20px;cursor:pointer;}
  .backbtn:active{background:var(--surface-2);}

  .courtline{border:none;border-top:2px dashed var(--line);margin:18px 0;}

  main{padding:0 20px;flex:1;position:relative;}

  /* Screen transitions */
  @keyframes screenIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  .screen-anim{animation:screenIn .32s cubic-bezier(.2,.7,.3,1) both;}
  @media (prefers-reduced-motion: reduce){
    .screen-anim{animation:none;}
  }

  /* Home hero scene - subtle court/turf backdrop */
  .home-scene{position:relative;margin:0 -20px 8px;padding:26px 20px 22px;overflow:hidden;}
  .home-scene::before{
    content:"";position:absolute;inset:0;
    background-image:var(--duo-tex);
    background-size:cover;background-position:center;background-repeat:no-repeat;
    opacity:0.6;filter:saturate(0.8) brightness(0.85);
  }
  .home-scene::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(15,20,23,0.15) 0%, rgba(15,20,23,0.55) 60%, var(--bg) 100%);
  }
  .home-scene > *{position:relative;z-index:1;}

  h1.hero{font-family:'Teko',sans-serif;font-size:44px;line-height:0.95;font-weight:700;margin:6px 0 4px;letter-spacing:0.01em;}
  .sub{color:var(--ink-dim);font-size:14px;margin:0 0 22px;line-height:1.5;}

  .cardgrid{display:flex;flex-direction:column;gap:14px;}
  .gamecard{background:rgba(27,34,38,0.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:transform .15s ease, border-color .15s;}
  .gamecard:active{transform:scale(0.97);}
  .gamecard.pickle{border-left:4px solid var(--green);}
  .gamecard.cricket{border-left:4px solid var(--red);}
  .gc-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .gc-body .gc-title{font-family:'Teko';font-size:26px;font-weight:600;line-height:1;}
  .gc-body .gc-desc{color:var(--ink-dim);font-size:13px;margin-top:3px;}
  .gc-arrow{margin-left:auto;color:var(--ink-dim);font-size:20px;}

  label{display:block;font-size:12px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 6px;font-weight:600;}
  label.first{margin-top:0;}
  input[type=text],input[type=number],textarea,select{
    width:100%;background:var(--surface);border:1px solid var(--line);color:var(--ink);
    padding:12px 14px;border-radius:10px;font-family:'Inter';font-size:15px;outline:none;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--amber);}
  textarea{resize:vertical;min-height:70px;font-family:'Inter';}
  .hint{font-size:12px;color:var(--ink-dim);margin-top:4px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;padding:14px 18px;font-family:'Inter';font-weight:600;font-size:15px;cursor:pointer;width:100%;margin-top:18px;transition:transform .12s ease, filter .12s ease;}
  .btn:active{transform:scale(0.97);filter:brightness(0.94);}
  .btn-amber{background:var(--amber);color:#1B1400;}
  .btn-green{background:var(--green);color:#08150D;}
  .btn-red{background:var(--red);color:#210706;}
  .btn-outline{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn-sm{width:auto;padding:9px 16px;font-size:13px;margin-top:0;}
  .btn-row{display:flex;gap:10px;margin-top:18px;}
  .btn-row .btn{margin-top:0;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}

  .box-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px;}
  .box-block.next-box{position:relative;overflow:hidden;isolation:isolate;border-color:var(--amber-dim);}
  .box-block.next-box::before{
    content:"";position:absolute;inset:0;z-index:0;
    background-image:var(--court-tex);background-size:cover;background-position:center;background-repeat:no-repeat;
    opacity:0.25;filter:saturate(0.7) brightness(0.7);
  }
  .box-block.next-box > *{position:relative;z-index:1;}
  .box-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .box-head .box-title{font-family:'Teko';font-size:22px;}
  .tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:0.03em;}
  .tag-live{background:var(--amber-dim);color:var(--amber);}
  .tag-done{background:var(--green-dim);color:#8FE0AC;}
  .tag-pending{background:var(--surface-2);color:var(--ink-dim);}

  .match-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px dashed var(--line);}
  .match-row:first-child{border-top:none;}
  .m-teams{font-size:14px;}
  .m-teams b{color:var(--ink);}
  .m-score{font-family:'JetBrains Mono';font-size:13px;color:var(--ink-dim);}
  .m-status{font-size:12px;color:var(--amber);font-weight:600;}

  .standings{margin-top:6px;}
  .stand-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px dashed var(--line);font-size:14px;}
  .stand-row:first-child{border-top:none;}
  .stand-rank{font-family:'JetBrains Mono';color:var(--ink-dim);width:18px;}
  .stand-name{flex:1;}
  .stand-stats{font-family:'JetBrains Mono';font-size:12px;color:var(--ink-dim);}
  .winner-badge{background:var(--amber);color:#1B1400;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:6px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:overlayIn .2s ease;}
  .modal{background:var(--surface);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:22px 20px 30px;border-top:1px solid var(--line);animation:modalUp .3s cubic-bezier(.2,.7,.3,1);}
  @keyframes overlayIn{from{opacity:0;} to{opacity:1;}}
  @keyframes modalUp{from{transform:translateY(40px); opacity:0.5;} to{transform:translateY(0); opacity:1;}}
  @media (prefers-reduced-motion: reduce){
    .modal-overlay, .modal{animation:none;}
  }
  .modal h3{font-family:'Teko';font-size:24px;margin:0 0 4px;}
  .modal .msub{color:var(--ink-dim);font-size:13px;margin-bottom:16px;}
  .score-inputs{display:flex;gap:12px;}
  .score-inputs > div{flex:1;}

  /* Cricket scoreboard */
  .scoreboard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px 20px;text-align:center;position:relative;overflow:hidden;isolation:isolate;}
  .scoreboard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg, var(--amber) 0 10px, transparent 10px 20px);opacity:0.5;z-index:2;}
  .scoreboard::after{
    content:"";position:absolute;inset:0;z-index:0;
    background-image:var(--turf-tex);background-size:cover;background-position:center;background-repeat:no-repeat;
    opacity:0.35;filter:saturate(0.7) brightness(0.7);
  }
  .scoreboard > *{position:relative;z-index:1;}
  .sb-teams{font-size:12px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
  .sb-score{font-family:'JetBrains Mono';font-size:52px;font-weight:700;color:var(--amber);text-shadow:0 0 18px rgba(242,183,5,0.35);line-height:1;animation:scorePulse .35s ease;}
  .sb-overs{font-family:'JetBrains Mono';font-size:15px;color:var(--ink-dim);margin-top:6px;}
  .sb-target{font-size:12px;color:var(--green);margin-top:8px;font-weight:600;}
  @keyframes scorePulse{
    0%{transform:scale(1.12);text-shadow:0 0 28px rgba(242,183,5,0.6);}
    100%{transform:scale(1);text-shadow:0 0 18px rgba(242,183,5,0.35);}
  }
  @media (prefers-reduced-motion: reduce){
    .sb-score{animation:none;}
  }

  /* Coin flip */
  .coin-wrap{perspective:600px;display:flex;justify-content:center;padding:24px 0;}
  .coin{
    width:110px;height:110px;border-radius:50%;

  .award-name{font-family:'Teko';font-size:20px;line-height:1.1;}
  .award-stat{margin-left:auto;font-family:'JetBrains Mono';font-size:13px;color:var(--amber);white-space:nowrap;}

  .team-input-block{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px;}
  .rm-btn{background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;float:right;}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ---------------- STATE ---------------- */
let state = {
  screen: 'home',
  pickle: { numBoxes: 1, boxSetup: [], boxes: [] },
  cricket: null
};
let modal = null;
let undoSnapshot = null;

function setState(patch){ state = {...state, ...patch}; render(); }
function openModal(m){ modal = m; render(); }
function closeModal(){ modal = null; render(); }

/* ---------------- UNDO ---------------- */
function pushUndoSnapshot(){
  try{ undoSnapshot = JSON.stringify(state); }catch(e){ undoSnapshot = null; }
}
function performUndo(){
  if(!undoSnapshot) return;
  try{ state = JSON.parse(undoSnapshot); }catch(e){}
  undoSnapshot = null;
  render();
}

/* ---------------- SESSION PERSISTENCE (survives accidental refresh) ---------------- */
const SESSION_KEY = 'matchday_session_v1';
function saveSession(){
  try{
    if(state.screen === 'home'){ localStorage.removeItem(SESSION_KEY); return; }
    localStorage.setItem(SESSION_KEY, JSON.stringify(state));
  }catch(e){ /* storage unavailable - fail silently, in-memory session still works */ }
}
function loadSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function clearSession(){
  try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
}

function isMidMatch(){
  if(state.screen === 'pk-play'){
    return state.pickle.boxes.some(b=> b.schedule.some(m=>!m.played));
  }
  return ['ck-toss','ck-openers','ck-live'].includes(state.screen);
}

window.addEventListener('beforeunload', function(e){
  if(isMidMatch()){
    e.preventDefault();
    e.returnValue = '';
  }
});

/* ---------------- HELPERS ---------------- */
function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* Round-robin schedule generator (circle method), returns array of [teamIndexA, teamIndexB] */
function roundRobinSchedule(n){
  const teams = [...Array(n).keys()];
  if(n % 2 !== 0) teams.push(-1); // bye
  const rounds = teams.length - 1;
  const half = teams.length / 2;
  let arr = [...teams];
  const schedule = [];
  for(let r=0;r<rounds;r++){
    for(let i=0;i<half;i++){
      const a = arr[i], b = arr[arr.length-1-i];
      if(a !== -1 && b !== -1) schedule.push([a,b]);
    }
    const fixed = arr[0];
    const rest = arr.slice(1);
    rest.unshift(rest.pop());
    arr = [fixed, ...rest];
  }
  return schedule;
}

function computeStandings(box){
  const stats = box.teams.map((t,i)=>({idx:i, name:t.name, wins:0, losses:0, pf:0, pa:0}));
  box.schedule.forEach(m=>{
    if(!m.played) return;
    const A = stats[m.a], B = stats[m.b];
    A.pf += m.scoreA; A.pa += m.scoreB;
    B.pf += m.scoreB; B.pa += m.scoreA;
    if(m.scoreA > m.scoreB){ A.wins++; B.losses++; }
    else if(m.scoreB > m.scoreA){ B.wins++; A.losses++; }
  });
  stats.forEach(s=> s.diff = s.pf - s.pa);
  stats.sort((a,b)=> b.wins - a.wins || b.diff - a.diff || b.pf - a.pf);
  return stats;
}

/* ---------------- RENDER ROOT ---------------- */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderTopbar());
  const main = document.createElement('main');
  const screenEl = renderScreen();
  screenEl.classList.add('screen-anim');
  main.appendChild(screenEl);
  app.appendChild(main);
  if(modal) app.appendChild(renderModal());
  saveSession();
}

function renderTopbar(){
  const bar = el(`<div class="topbar">
    <div class="brand"><div class="dot"></div><span>MATCHDAY</span></div>
  </div>`);
  if(state.screen !== 'home'){
    const back = el(`<button class="backbtn">&larr; Home</button>`);
    back.onclick = ()=> setState({screen:'home', pickle:{numBoxes:1, boxSetup:[], boxes:[]}, cricket:null});
    bar.appendChild(back);
  }
  return bar;
}

/* ---------------- SCREEN ROUTER ---------------- */
function renderScreen(){
  switch(state.screen){
    case 'home': return screenHome();
    case 'pk-setup': return screenPickleSetup();
    case 'pk-play': return screenPicklePlay();
    case 'ck-setup': return screenCricketSetup();
    case 'ck-toss': return screenCricketToss();
    case 'ck-openers': return screenCricketOpeners();
    case 'ck-live': return screenCricketLive();
    case 'ck-result': return screenCricketResult();
    default: return screenHome();
  }
}

/* ================= HOME ================= */
function screenHome(){
  const wrap = el(`<div>
    <div class="home-scene">
      <h1 class="hero">Run the day.<br>Skip the confusion.</h1>
      <p class="sub">Pick a game. We'll handle who plays next, who won, and what's left.</p>
      <div class="cardgrid">
        <div class="gamecard pickle">
          <div class="gc-icon">
            <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="16" r="13" stroke="var(--green)" stroke-width="2.2" fill="rgba(63,143,92,0.14)"/>
              <circle cx="11" cy="11" r="1.6" fill="var(--green)"/>
              <circle cx="21" cy="11" r="1.6" fill="var(--green)"/>
              <circle cx="16" cy="16" r="1.6" fill="var(--green)"/>
              <circle cx="11" cy="21" r="1.6" fill="var(--green)"/>
              <circle cx="21" cy="21" r="1.6" fill="var(--green)"/>
            </svg>
          </div>
          <div class="gc-body"><div class="gc-title">Pickle Ball</div><div class="gc-desc">Box draws, round robin, auto standings</div></div>
          <div class="gc-arrow">→</div>
        </div>
        <div class="gamecard cricket">
          <div class="gc-icon">
            <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
              <rect x="6" y="20" width="20" height="6.5" rx="3.2" transform="rotate(-40 6 20)" fill="rgba(193,68,60,0.18)" stroke="var(--red)" stroke-width="2"/>
              <line x1="19" y1="12" x2="24" y2="7" stroke="var(--red)" stroke-width="2.4" stroke-linecap="round"/>
              <circle cx="25.5" cy="5.5" r="2.6" fill="var(--red)"/>
            </svg>
          </div>
          <div class="gc-body"><div class="gc-title">Cricket</div><div class="gc-desc">Toss, live score, ball by ball</div></div>
          <div class="gc-arrow">→</div>
        </div>
      </div>
    </div>
  </div>`);
  wrap.querySelector('.gamecard.pickle').onclick = ()=> setState({screen:'pk-setup'});
  wrap.querySelector('.gamecard.cricket').onclick = ()=> setState({screen:'ck-setup'});
  return wrap;
}

/* ================= PICKLE: SETUP ================= */
function screenPickleSetup(){
  const numBoxes = state.pickle.numBoxes;
  let boxSetup = state.pickle.boxSetup;
  while(boxSetup.length < numBoxes) boxSetup.push({teamCount:3, names:['Team A','Team B','Team C']});
  boxSetup = boxSetup.slice(0, numBoxes);

  const wrap = el(`<div>
    <h1 class="hero" style="font-size:34px;">New pickle ball session</h1>
    <p class="sub">Tell us how many boxes and who's in each. We'll build the schedule.</p>
    <label class="first">How many boxes today?</label>
    <input type="number" id="numBoxes" min="1" max="6" value="${numBoxes}">
    <div id="boxSetupArea"></div>
    <button class="btn btn-green" id="genBtn">Create matches</button>
  </div>`);

  function renderBoxSetups(){
    const area = wrap.querySelector('#boxSetupArea');
    area.innerHTML = '';
    boxSetup.forEach((bs, bi)=>{
      const block = el(`<div class="team-input-block">
        <label class="first">Box ${bi+1} — number of teams</label>
        <input type="number" min="2" max="8" value="${bs.teamCount}" data-bi="${bi}" class="teamCountInput">
        <label>Team names (one per line)</label>
        <textarea data-bi="${bi}" class="teamNamesInput" rows="${bs.teamCount}">${bs.names.slice(0,bs.teamCount).join('\n')}</textarea>
      </div>`);
      block.querySelector('.teamCountInput').oninput = (e)=>{
        const n = Math.max(2, Math.min(8, parseInt(e.target.value)||2));
        boxSetup[bi].teamCount = n;
        while(boxSetup[bi].names.length < n) boxSetup[bi].names.push('Team '+String.fromCharCode(65+boxSetup[bi].names.length));
        renderBoxSetups();
      };
      block.querySelector('.teamNamesInput').oninput = (e)=>{
        boxSetup[bi].names = e.target.value.split('\n');
      };
      area.appendChild(block);
    });
  }
  renderBoxSetups();

  wrap.querySelector('#numBoxes').oninput = (e)=>{
    const n = Math.max(1, Math.min(6, parseInt(e.target.value)||1));
    state.pickle.numBoxes = n;
    render();
  };

  wrap.querySelector('#genBtn').onclick = ()=>{
    const boxes = boxSetup.map((bs, bi)=>{
      const names = bs.names.slice(0,bs.teamCount).map((n,i)=> (n && n.trim()) ? n.trim() : ('Team '+(i+1)));
      const teams = names.map(n=>({name:n}));
      const pairs = roundRobinSchedule(teams.length);
      const schedule = pairs.map(([a,b])=>({a,b,scoreA:null,scoreB:null,played:false}));
      return { title:'Box '+(bi+1), teams, schedule };
    });
    state.pickle.boxSetup = boxSetup;
    setState({ screen:'pk-play', pickle:{...state.pickle, boxes} });
  };

  return wrap;
}

/* ================= PICKLE: PLAY ================= */
function screenPicklePlay(){
  const wrap = el(`<div><h1 class="hero" style="font-size:34px;">Today's boxes</h1><p class="sub">Tap a match to enter the score once it's done.</p><button class="btn btn-outline" id="pkUndoBtn" ${undoSnapshot ? '' : 'disabled'} style="margin-top:0;margin-bottom:18px;">↶ Undo last action</button><div id="boxesArea"></div></div>`);
  const area = wrap.querySelector('#boxesArea');
  wrap.querySelector('#pkUndoBtn').onclick = performUndo;

  state.pickle.boxes.forEach((box, boxIdx)=>{
    const allPlayed = box.schedule.every(m=>m.played);
    const nextIdx = box.schedule.findIndex(m=>!m.played);

    const block = el(`<div class="box-block ${allPlayed ? '' : 'next-box'}">
      <div class="box-head">
        <div class="box-title">${esc(box.title)}</div>
        ${allPlayed ? '<span class="tag tag-done">COMPLETE</span>' : '<span class="tag tag-live">IN PROGRESS</span>'}
      </div>
      <div class="matches"></div>
      <div class="standings"></div>
    </div>`);

    const matchesDiv = block.querySelector('.matches');
    box.schedule.forEach((m, mi)=>{
      const teamA = box.teams[m.a].name, teamB = box.teams[m.b].name;
      const row = el(`<div class="match-row" style="${mi===nextIdx?'':'opacity:'+(m.played?1:0.55)+';'}">
        <div class="m-teams"><b>${esc(teamA)}</b> vs <b>${esc(teamB)}</b></div>
        ${m.played
          ? `<div class="m-score">${m.scoreA} — ${m.scoreB}</div>`
          : (mi===nextIdx ? `<div class="m-status">NEXT ▸</div>` : `<div class="m-score" style="color:var(--ink-dim);">waiting</div>`)}
      </div>`);
      if(mi===nextIdx){
        row.style.cursor='pointer';
        row.onclick = ()=> openModal({type:'pickle-score', boxIdx, matchIdx:mi, teamA, teamB});
      }
      matchesDiv.appendChild(row);
    });

    const standDiv = block.querySelector('.standings');
    const anyPlayed = box.schedule.some(m=>m.played);
    if(anyPlayed){
      const stats = computeStandings(box);
      const head = el(`<label style="margin-top:16px;">Standings</label>`);
      standDiv.appendChild(head);
      stats.forEach((s,i)=>{
        const row = el(`<div class="stand-row">
          <div class="stand-rank">${i+1}</div>
          <div class="stand-name">${esc(s.name)} ${(allPlayed && i===0)?'<span class="winner-badge">BOX WINNER</span>':''}</div>
          <div class="stand-stats">${s.wins}W ${s.losses}L · diff ${s.diff>0?'+':''}${s.diff}</div>
        </div>`);
        standDiv.appendChild(row);
      });
    }

    area.appendChild(block);
  });

  return wrap;
}

/* Modal: pickle score entry */
function renderPickleScoreModal(m){
  const box = state.pickle.boxes[m.boxIdx];
  const match = box.schedule[m.matchIdx];
  const wrap = el(`<div class="modal-overlay">
    <div class="modal">
      <h3>Enter score</h3>
      <div class="msub">${esc(m.teamA)} vs ${esc(m.teamB)}</div>
      <div class="score-inputs">
        <div><label class="first">${esc(m.teamA)}</label><input type="number" id="scoreA" min="0"></div>
        <div><label class="first">${esc(m.teamB)}</label><input type="number" id="scoreB" min="0"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline" id="cancelBtn">Cancel</button>
        <button class="btn btn-amber" id="saveBtn">Save result</button>
      </div>
    </div>
  </div>`);
  wrap.querySelector('#cancelBtn').onclick = closeModal;
  wrap.querySelector('#saveBtn').onclick = ()=>{
    const a = parseInt(wrap.querySelector('#scoreA').value);
    const b = parseInt(wrap.querySelector('#scoreB').value);
    if(isNaN(a) || isNaN(b)){ return; }
    pushUndoSnapshot();
    match.scoreA = a; match.scoreB = b; match.played = true;
    closeModal();
  };
  return wrap;
}

/* ================= CRICKET: SETUP ================= */
function screenCricketSetup(){
  const c = state.cricket || {
    teamA:{name:'Team A', players:['Player 1','Player 2','Player 3']},
    teamB:{name:'Team B', players:['Player 1','Player 2','Player 3']},
    overs:5
  };
  const wrap = el(`<div>
    <h1 class="hero" style="font-size:34px;">New cricket match</h1>
    <p class="sub">Enter both squads. You'll pick openers after the toss.</p>

    <div class="team-input-block">
      <label class="first">Team A name</label>
      <input type="text" id="nameA" value="${esc(c.teamA.name)}">
      <label>Players (one per line)</label>
      <textarea id="playersA" rows="4">${c.teamA.players.join('\n')}</textarea>
    </div>
    <div class="team-input-block">
      <label class="first">Team B name</label>
      <input type="text" id="nameB" value="${esc(c.teamB.name)}">
      <label>Players (one per line)</label>
      <textarea id="playersB" rows="4">${c.teamB.players.join('\n')}</textarea>
    </div>
    <label>Overs per innings</label>
    <input type="number" id="overs" min="1" max="50" value="${c.overs}">
    <button class="btn btn-red" id="startBtn">Go to toss</button>
  </div>`);

  wrap.querySelector('#startBtn').onclick = ()=>{
    const nameA = wrap.querySelector('#nameA').value.trim() || 'Team A';
    const nameB = wrap.querySelector('#nameB').value.trim() || 'Team B';
    const playersA = wrap.querySelector('#playersA').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const playersB = wrap.querySelector('#playersB').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const overs = Math.max(1, parseInt(wrap.querySelector('#overs').value)||5);
    if(playersA.length < 2 || playersB.length < 2){ alert('Add at least 2 players per team.'); return; }
    state.cricket = {
      teamA:{name:nameA, players:playersA},
      teamB:{name:nameB, players:playersB},
      overs,
      tossWinner:null, tossChoice:null,
      battingTeamKey:null, bowlingTeamKey:null,
      innings:1,
      firstInningsScore:null, firstInningsTeamKey:null,
      score:0, wickets:0, ballsThisOver:0, oversCompleted:0,
      striker:null, nonStriker:null, bowler:null,
      dismissed:[], battingStats:{}, bowlingStats:{},
      ballFeed:[], prevBowler:null
    };
    setState({screen:'ck-toss'});
  };
  return wrap;
}

/* ================= CRICKET: TOSS ================= */
function cryptoRandom(){
  try{
    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);
    return arr[0] / 4294967296;
  }catch(e){
    return Math.random();
  }
}

function screenCricketToss(){
  const c = state.cricket;
  const wrap = el(`<div>
    <h1 class="hero" style="font-size:34px;">Toss time</h1>
    <p class="sub">${esc(c.teamA.name)} vs ${esc(c.teamB.name)}</p>
    <div class="coin-wrap">
      <div class="coin" id="coinFace">?</div>
    </div>
    <button class="btn btn-amber" id="flipBtn">Flip coin</button>
    <div id="afterToss"></div>
  </div>`);

  wrap.querySelector('#flipBtn').onclick = ()=>{
    const flipBtn = wrap.querySelector('#flipBtn');
    const coinEl = wrap.querySelector('#coinFace');
    if(flipBtn.disabled) return;
    flipBtn.disabled = true;

    // single random draw decides BOTH the displayed face and the toss winner, so they can never contradict
    const r = cryptoRandom();
    const face = r < 0.5 ? 'HEADS' : 'TAILS';
    const winnerKey = r < 0.5 ? 'teamA' : 'teamB';
    const winner = c[winnerKey];

    coinEl.textContent = '';
    coinEl.classList.remove('flipping');
    void coinEl.offsetWidth; // restart animation
    coinEl.classList.add('flipping');

    setTimeout(()=>{
      coinEl.textContent = face;
      c.tossWinner = winnerKey;
      const after = wrap.querySelector('#afterToss');
      after.innerHTML = '';
      const p = el(`<div>
        <p class="sub" style="margin-top:16px;"><b style="color:var(--ink);">${esc(winner.name)}</b> won the toss. Bat or bowl?</p>
        <div class="btn-row">
          <button class="btn btn-green" id="chooseBat">Bat</button>
          <button class="btn btn-outline" id="chooseBowl">Bowl</button>
        </div>
      </div>`);
      p.querySelector('#chooseBat').onclick = ()=> setupInnings(winnerKey, winnerKey);
      p.querySelector('#chooseBowl').onclick = ()=> setupInnings(winnerKey, winnerKey==='teamA'?'teamB':'teamA');
      after.appendChild(p);
      flipBtn.disabled = false;
      flipBtn.textContent = 'Flip again';
    }, 900);
  };

  function setupInnings(tossWinnerKey, battingKey){
    c.tossChoice = battingKey===tossWinnerKey ? 'bat' : 'bowl';
    c.battingTeamKey = battingKey;
    c.bowlingTeamKey = battingKey==='teamA' ? 'teamB' : 'teamA';
    setState({screen:'ck-openers'});
  }

  return wrap;
}

/* ================= CRICKET: PICK OPENERS ================= */
function screenCricketOpeners(){
  const c = state.cricket;
  const batTeam = c[c.battingTeamKey];
  const bowlTeam = c[c.bowlingTeamKey];
  let striker=null, nonStriker=null, bowler=null;

  const wrap = el(`<div>
    <h1 class="hero" style="font-size:34px;">Set the field</h1>
    <p class="sub"><b style="color:var(--ink)">${esc(batTeam.name)}</b> batting first. Pick openers and the opening bowler.</p>
    <label class="first">Striker</label>
    <div class="pill-select" id="strikerPills"></div>
    <label>Non-striker</label>
    <div class="pill-select" id="nonStrikerPills"></div>
    <label>Opening bowler (${esc(bowlTeam.name)})</label>
    <div class="pill-select" id="bowlerPills"></div>
    <button class="btn btn-red" id="beginBtn" disabled>Start innings</button>
  </div>`);

  function pillSet(containerSel, options, exclude, onPick){
    const container = wrap.querySelector(containerSel);
    container.innerHTML = '';
    options.forEach(name=>{
      if(exclude && exclude.includes(name)) return;
      const p = el(`<div class="pill">${esc(name)}</div>`);
      p.onclick = ()=>{ onPick(name); refreshAll(); };
      container.appendChild(p);
    });
  }

  function refreshAll(){
    pillSet('#strikerPills', batTeam.players, [nonStriker].filter(Boolean), (n)=>striker=n);
    pillSet('#nonStrikerPills', batTeam.players, [striker].filter(Boolean), (n)=>nonStriker=n);
    pillSet('#bowlerPills', bowlTeam.players, [], (n)=>bowler=n);
    [...wrap.querySelectorAll('#strikerPills .pill')].forEach(p=> p.classList.toggle('active', p.textContent===striker));
    [...wrap.querySelectorAll('#nonStrikerPills .pill')].forEach(p=> p.classList.toggle('active', p.textContent===nonStriker));
    [...wrap.querySelectorAll('#bowlerPills .pill')].forEach(p=> p.classList.toggle('active', p.textContent===bowler));
    wrap.querySelector('#beginBtn').disabled = !(striker && nonStriker && bowler && striker!==nonStriker);
  }
  refreshAll();

  wrap.querySelector('#beginBtn').onclick = ()=>{
    c.striker = striker; c.nonStriker = nonStriker; c.bowler = bowler;
    c.battingStats[striker] = {runs:0, balls:0};
    c.battingStats[nonStriker] = {runs:0, balls:0};
    c.bowlingStats[bowler] = {runs:0, balls:0, wickets:0};
    c.prevBowler = null;
    setState({screen:'ck-live'});
  };

  return wrap;
}

/* ================= CRICKET: LIVE SCORING ================= */
function screenCricketLive(){
  const c = state.cricket;
  const battingName = c[c.battingTeamKey].name;
  const bowlingName = c[c.bowlingTeamKey].name;
  const oversStr = `${c.oversCompleted}.${c.ballsThisOver}`;

  const wrap = el(`<div>
    <div class="scoreboard">
      <div class="sb-teams">${esc(battingName)} batting · vs ${esc(bowlingName)}</div>
      <div class="sb-score">${c.score}/${c.wickets}</div>
      <div class="sb-overs">${oversStr} overs · of ${c.overs}</div>
      ${c.innings===2 ? `<div class="sb-target">Need ${Math.max(c.target - c.score,0)} runs off ${Math.max((c.overs*6) - (c.oversCompleted*6+c.ballsThisOver),0)} balls</div>` : ''}
    </div>

    <div class="batters">
      <div class="batter-row striker">
        <div class="b-name"><span class="star">●</span>${esc(c.striker)}</div>
        <div class="b-stats">${c.battingStats[c.striker].runs} (${c.battingStats[c.striker].balls})</div>
      </div>
      <div class="batter-row">
        <div class="b-name">${esc(c.nonStriker)}</div>
        <div class="b-stats">${c.battingStats[c.nonStriker].runs} (${c.battingStats[c.nonStriker].balls})</div>
      </div>
    </div>
    <div class="bowler-row">
      <div class="b-name">${esc(c.bowler)}</div>
      <div class="b-stats">${c.bowlingStats[c.bowler].wickets}/${c.bowlingStats[c.bowler].runs}</div>
    </div>

    <div class="runbtns" id="runBtns">
      ${[0,1,2,3,4,6].map(r=>`<div class="runbtn" data-r="${r}">${r}</div>`).join('')}
    </div>
    <div class="extrabtns">
      <div class="extrabtn" id="wideBtn">Wide (+1)</div>
      <div class="extrabtn" id="noballBtn">No ball…</div>
      <div class="extrabtn" id="swapBtn">Swap strike</div>
    </div>
    <div class="wicketbtn" id="wicketBtn">Wicket</div>

    <div class="ballfeed">${c.ballFeed.slice(-12).map(b=>`<div class="ball-chip ${b==='W'?'wk':b==='4'?'four':b==='6'?'six':''}">${b}</div>`).join('')}</div>

    <button class="btn btn-outline" id="undoBtn" ${undoSnapshot ? '' : 'disabled'} style="margin-top:22px;">↶ Undo last action</button>
    <button class="btn btn-outline" id="endInningsBtn">End innings now</button>
  </div>`);

  wrap.querySelectorAll('.runbtn').forEach(btn=>{
    btn.onclick = ()=> cricketAddBall(parseInt(btn.dataset.r), true, null);
  });
  wrap.querySelector('#wideBtn').onclick = ()=> cricketAddBall(1, false, 'Wd');
  wrap.querySelector('#noballBtn').onclick = ()=> openModal({type:'noball-runs'});
  wrap.querySelector('#swapBtn').onclick = ()=>{ pushUndoSnapshot(); cricketSwapStrike(); render(); };
  wrap.querySelector('#wicketBtn').onclick = cricketHandleWicket;
  wrap.querySelector('#endInningsBtn').onclick = ()=>{ pushUndoSnapshot(); cricketFinishInnings(); };
  wrap.querySelector('#undoBtn').onclick = performUndo;

  return wrap;
}

/* ---- Cricket scoring logic (module-level so modals can call it too) ---- */
function cricketSwapStrike(){
  const c = state.cricket;
  const tmp = c.striker; c.striker = c.nonStriker; c.nonStriker = tmp;
}

function cricketCheckInningsEnd(){
  const c = state.cricket;
  const oversDone = c.oversCompleted >= c.overs;
  const chased = c.innings===2 && c.score >= c.target;
  const allOut = c.wickets >= (c[c.battingTeamKey].players.length - 1);
  if(allOut || oversDone || chased){
    cricketFinishInnings();
    return true;
  }
  return false;
}

function cricketFinishInnings(){
  const c = state.cricket;
  if(c.innings === 1){
    // snapshot innings 1 stats before resetting, so we can compute match awards later
    c.innings1 = JSON.parse(JSON.stringify({
      battingStats: c.battingStats,
      bowlingStats: c.bowlingStats,
      battingTeamKey: c.battingTeamKey,
      bowlingTeamKey: c.bowlingTeamKey
    }));
    c.firstInningsScore = c.score;
    c.firstInningsTeamKey = c.battingTeamKey;
    const newBatting = c.bowlingTeamKey;
    const newBowling = c.battingTeamKey;
    c.battingTeamKey = newBatting;
    c.bowlingTeamKey = newBowling;
    c.innings = 2;
    c.target = c.firstInningsScore + 1;
    c.score = 0; c.wickets = 0; c.ballsThisOver = 0; c.oversCompleted = 0;
    c.striker = null; c.nonStriker = null; c.bowler = null;
    c.battingStats = {}; c.bowlingStats = {}; c.ballFeed = []; c.prevBowler = null;
    setState({screen:'ck-openers'});
  } else {
    setState({screen:'ck-result'});
  }
}

function cricketPromptNewBowler(){
  const c = state.cricket;
  const bowlTeam = c[c.bowlingTeamKey];
  openModal({type:'pick-bowler', options: bowlTeam.players.filter(p=>p!==c.prevBowler)});
}

function cricketAddBall(runs, legal, extraLabel){
  pushUndoSnapshot();
  const c = state.cricket;
  if(legal){
    c.battingStats[c.striker].balls++;
    c.bowlingStats[c.bowler].balls++;
  }
  c.battingStats[c.striker].runs += (extraLabel ? 0 : runs);
  c.bowlingStats[c.bowler].runs += runs;
  c.score += runs;
  c.ballFeed.push(extraLabel ? extraLabel : String(runs));

  if(legal){
    c.ballsThisOver++;
    if(runs % 2 === 1) cricketSwapStrike();
    if(c.ballsThisOver >= 6){
      c.oversCompleted++;
      c.ballsThisOver = 0;
      cricketSwapStrike();
      c.prevBowler = c.bowler;
      if(cricketCheckInningsEnd()) return;
      cricketPromptNewBowler();
      return;
    }
  }
  if(cricketCheckInningsEnd()) return;
  render();
}

function cricketAddNoBall(runsOffBat){
  pushUndoSnapshot();
  const c = state.cricket;
  const total = 1 + runsOffBat;
  c.battingStats[c.striker].runs += runsOffBat;
  c.bowlingStats[c.bowler].runs += total;
  c.score += total;
  c.ballFeed.push(runsOffBat > 0 ? ('Nb+'+runsOffBat) : 'Nb');
  if(runsOffBat % 2 === 1) cricketSwapStrike();
  if(cricketCheckInningsEnd()) return;
  render();
}

function cricketHandleWicket(){
  pushUndoSnapshot();
  const c = state.cricket;
  const bowlerStats = c.bowlingStats[c.bowler];
  c.battingStats[c.striker].balls++;
  bowlerStats.balls++;
  bowlerStats.wickets++;
  c.wickets++;
  c.ballFeed.push('W');
  c.ballsThisOver++;
  const outBatsman = c.striker;
  if(c.ballsThisOver >= 6){
    c.oversCompleted++;
    c.ballsThisOver = 0;
    c.prevBowler = c.bowler;
  }
  if(cricketCheckInningsEnd()) return;
  const usedPlayers = new Set([...Object.keys(c.battingStats)]);
  const available = c[c.battingTeamKey].players.filter(p=> !usedPlayers.has(p));
  if(available.length === 0){ cricketFinishInnings(); return; }
  openModal({type:'pick-batsman', options: available, replacing: outBatsman});
}

/* ================= CRICKET: RESULT ================= */
function computeMatchAwards(c){
  const battingMerged = {...(c.innings1 ? c.innings1.battingStats : {}), ...c.battingStats};
  const bowlingMerged = {...(c.innings1 ? c.innings1.bowlingStats : {}), ...c.bowlingStats};

  let topRunsName = null, topRuns = -1;
  Object.entries(battingMerged).forEach(([name, s])=>{
    if(s.runs > topRuns){ topRuns = s.runs; topRunsName = name; }
  });

  let topWicketsName = null, topWickets = -1, topWicketsRuns = Infinity;
  Object.entries(bowlingMerged).forEach(([name, s])=>{
    if(s.wickets > topWickets || (s.wickets === topWickets && s.runs < topWicketsRuns)){
      topWickets = s.wickets; topWicketsName = name; topWicketsRuns = s.runs;
    }
  });

  const impact = {};
  Object.entries(battingMerged).forEach(([name, s])=>{
    impact[name] = impact[name] || {runs:0, wickets:0};
    impact[name].runs += s.runs;
  });
  Object.entries(bowlingMerged).forEach(([name, s])=>{
    impact[name] = impact[name] || {runs:0, wickets:0};
    impact[name].wickets += s.wickets;
  });
  let motmName = null, motmScore = -1, motmStats = null;
  Object.entries(impact).forEach(([name, s])=>{
    const score = s.runs + s.wickets*20;
    if(score > motmScore){ motmScore = score; motmName = name; motmStats = s; }
  });

  return {
    motm: motmName ? {name: motmName, runs: motmStats.runs, wickets: motmStats.wickets} : null,
    topRuns: topRunsName ? {name: topRunsName, runs: topRuns, balls: battingMerged[topRunsName].balls} : null,
    topWickets: (topWicketsName && topWickets > 0) ? {name: topWicketsName, wickets: topWickets, runs: topWicketsRuns} : null
  };
}

function screenCricketResult(){
  const c = state.cricket;
  const firstKey = c.firstInningsTeamKey;
  const secondKey = firstKey === 'teamA' ? 'teamB' : 'teamA';
  const firstScore = c.firstInningsScore;
  const secondScore = c.score;
  let resultText;
  if(secondScore >= c.target){
    const wicketsLeft = (c[secondKey].players.length - 1) - c.wickets;
    resultText = `${c[secondKey].name} win by ${wicketsLeft} wicket${wicketsLeft===1?'':'s'}`;
  } else if(secondScore === firstScore){
    resultText = `Match tied`;
  } else {
    resultText = `${c[firstKey].name} win by ${firstScore - secondScore} run${(firstScore-secondScore)===1?'':'s'}`;
  }

  const awards = computeMatchAwards(c);

  const wrap = el(`<div>
    <div class="result-hero">
    <div class="trophy">
        <svg width="44" height="44" viewBox="0 0 32 32" fill="none">
          <path d="M10 6h12v6a6 6 0 0 1-12 0V6z" stroke="var(--amber)" stroke-width="2" fill="rgba(242,183,5,0.14)"/>
          <path d="M10 8H6a4 4 0 0 0 4 6" stroke="var(--amber)" stroke-width="2" stroke-linecap="round"/>
          <path d="M22 8h4a4 4 0 0 1-4 6" stroke="var(--amber)" stroke-width="2" stroke-linecap="round"/>
          <line x1="16" y1="18" x2="16" y2="23" stroke="var(--amber)" stroke-width="2"/>
          <path d="M11 27h10l-1.5-3.5h-7L11 27z" fill="var(--amber)" opacity="0.85"/>
        </svg>
    </div>
      <h2>${esc(resultText)}</h2>
      <p>${esc(c[firstKey].name)} ${firstScore} · ${esc(c[secondKey].name)} ${secondScore}</p>
    </div>

    <div class="awards-grid">
      ${awards.motm ? `
      <div class="award-card motm">
        <div class="award-icon">🌟</div>
        <div>
          <div class="award-label">Player of the Match</div>
          <div class="award-name">${esc(awards.motm.name)}</div>
        </div>
        <div class="award-stat">${awards.motm.runs} runs${awards.motm.wickets ? ' · '+awards.motm.wickets+' wkt'+(awards.motm.wickets===1?'':'s') : ''}</div>
      </div>` : ''}
      ${awards.topRuns ? `
      <div class="award-card">
        <div class="award-icon">🏏</div>
        <div>
          <div class="award-label">Most Runs</div>
          <div class="award-name">${esc(awards.topRuns.name)}</div>
        </div>
        <div class="award-stat">${awards.topRuns.runs} (${awards.topRuns.balls})</div>
      </div>` : ''}
      ${awards.topWickets ? `
      <div class="award-card">
        <div class="award-icon">🎯</div>
        <div>
          <div class="award-label">Most Wickets</div>
          <div class="award-name">${esc(awards.topWickets.name)}</div>
        </div>
        <div class="award-stat">${awards.topWickets.wickets}/${awards.topWickets.runs}</div>
      </div>` : ''}
    </div>

    <button class="btn btn-red" id="newMatchBtn">Start new match</button>
  </div>`);
  wrap.querySelector('#newMatchBtn').onclick = ()=> setState({screen:'ck-setup', cricket:null});
  return wrap;
}

/* ================= MODALS ROUTER ================= */
function renderModal(){
  if(modal.type === 'pickle-score') return renderPickleScoreModal(modal);
  if(modal.type === 'pick-bowler') return renderPickBowlerModal(modal);
  if(modal.type === 'pick-batsman') return renderPickBatsmanModal(modal);
  if(modal.type === 'noball-runs') return renderNoBallRunsModal(modal);
  if(modal.type === 'resume-session') return renderResumeSessionModal(modal);
  return el('<div></div>');
}

function renderResumeSessionModal(m){
  const wrap = el(`<div class="modal-overlay">
    <div class="modal">
      <h3>Resume last session?</h3>
      <div class="msub">Looks like a match was still in progress. Pick up right where it left off, or start clean.</div>
      <div class="btn-row">
        <button class="btn btn-outline" id="discardBtn">Start fresh</button>
        <button class="btn btn-amber" id="resumeBtn">Resume match</button>
      </div>
    </div>
  </div>`);
  wrap.querySelector('#discardBtn').onclick = ()=>{
    clearSession();
    modal = null;
    render();
  };
  wrap.querySelector('#resumeBtn').onclick = ()=>{
    state = m.saved;
    modal = null;
    render();
  };
  return wrap;
}

function renderNoBallRunsModal(m){
  const wrap = el(`<div class="modal-overlay">
    <div class="modal">
      <h3>No ball — runs off the bat?</h3>
      <div class="msub">The 1-run penalty is added automatically on top</div>
      <div class="pill-select" id="opts">
        ${[0,1,2,3,4,6].map(r=>`<div class="pill" data-r="${r}">${r}</div>`).join('')}
      </div>
    </div>
  </div>`);
  wrap.querySelectorAll('.pill').forEach(p=>{
    p.onclick = ()=>{
      modal = null;
      cricketAddNoBall(parseInt(p.dataset.r));
    };
  });
  return wrap;
}

function renderPickBowlerModal(m){
  const c = state.cricket;
  const wrap = el(`<div class="modal-overlay">
    <div class="modal">
      <h3>New over — pick bowler</h3>
      <div class="msub">Can't be the same bowler as last over</div>
      <div class="pill-select" id="opts"></div>
    </div>
  </div>`);
  const opts = wrap.querySelector('#opts');
  m.options.forEach(name=>{
    const p = el(`<div class="pill">${esc(name)}</div>`);
    p.onclick = ()=>{
      c.bowler = name;
      if(!c.bowlingStats[name]) c.bowlingStats[name] = {runs:0, balls:0, wickets:0};
      closeModal();
    };
    opts.appendChild(p);
  });
  return wrap;
}

function renderPickBatsmanModal(m){
  const c = state.cricket;
  const wrap = el(`<div class="modal-overlay">
    <div class="modal">
      <h3>Wicket! Next batsman</h3>
      <div class="msub">${esc(m.replacing)} is out</div>
      <div class="pill-select" id="opts"></div>
    </div>
  </div>`);
  const opts = wrap.querySelector('#opts');
  m.options.forEach(name=>{
    const p = el(`<div class="pill">${esc(name)}</div>`);
    p.onclick = ()=>{
      c.striker = name;
      c.battingStats[name] = {runs:0, balls:0};
      closeModal();
    };
    opts.appendChild(p);
  });
  return wrap;
}

(function initApp(){
  const saved = loadSession();
  if(saved && saved.screen && saved.screen !== 'home'){
    modal = {type:'resume-session', saved};
  }
  render();
})();

</script>
